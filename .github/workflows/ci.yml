name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests (with race detector)
        run: go test ./... -v -race -count=1

      - name: Install mcp-assert
        run: go install ./cmd/mcp-assert

      - name: Trajectory assertions (no server needed)
        run: |
          mcp-assert run \
            --suite examples/trajectory \
            --timeout 5s \
            --junit trajectory-results.xml

      - name: Upload trajectory results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trajectory-results
          path: trajectory-results.xml
          if-no-files-found: ignore

  # End-to-end: filesystem server
  e2e-filesystem:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install mcp-assert
        run: go install ./cmd/mcp-assert

      - name: Install filesystem server
        run: npm install -g @modelcontextprotocol/server-filesystem

      - name: Run filesystem assertions
        run: |
          mcp-assert run \
            --suite examples/filesystem \
            --fixture ${{ github.workspace }}/examples/filesystem/fixtures \
            --timeout 30s \
            --junit filesystem-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: filesystem-results
          path: filesystem-results.xml

  # End-to-end: memory server
  e2e-memory:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install mcp-assert
        run: go install ./cmd/mcp-assert

      - name: Install memory server
        run: npm install -g @modelcontextprotocol/server-memory

      - name: Run memory assertions
        run: |
          mcp-assert run \
            --suite examples/memory \
            --timeout 30s \
            --junit memory-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: memory-results
          path: memory-results.xml

  # End-to-end: SQLite server (Python)
  e2e-sqlite:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install mcp-assert
        run: go install ./cmd/mcp-assert

      - name: Run SQLite assertions
        run: |
          mcp-assert run \
            --suite examples/sqlite \
            --fixture ${{ github.workspace }}/examples/sqlite/fixtures \
            --timeout 30s \
            --junit sqlite-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sqlite-results
          path: sqlite-results.xml

  # End-to-end: agent-lsp + gopls
  e2e-agent-lsp:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install mcp-assert
        run: go install ./cmd/mcp-assert

      - name: Install gopls
        run: go install golang.org/x/tools/gopls@latest

      - name: Clone agent-lsp and build
        run: |
          git clone --depth 1 https://github.com/blackwell-systems/agent-lsp.git /tmp/agent-lsp
          cd /tmp/agent-lsp && go build -o /usr/local/bin/agent-lsp ./cmd/agent-lsp

      - name: Run agent-lsp assertions
        run: |
          mcp-assert run \
            --suite examples/agent-lsp-go \
            --fixture /tmp/agent-lsp/test/fixtures/go \
            --timeout 120s \
            --junit agent-lsp-results.xml

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-lsp-results
          path: agent-lsp-results.xml
