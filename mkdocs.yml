site_name: mcp-assert
site_description: Deterministic correctness testing for MCP servers
site_url: https://blackwell-systems.github.io/mcp-assert
repo_url: https://github.com/blackwell-systems/mcp-assert
theme:
  name: material
  palette:
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
