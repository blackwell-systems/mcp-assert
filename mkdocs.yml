  - Scorecard: scorecard.md
  - Roadmap: roadmap.md
  - Distribution: distribution.md
  - Dogfooding: dogfooding.md
  - "Dogfooding: GitHub MCP": dogfooding-github-mcp.md
  - Audit Results:
    - "First Round": cold-start-audit.md
