<svg xmlns="http://www.w3.org/2000/svg" width="186" height="28" viewBox="0 0 186 28">
  <defs>
    <linearGradient id="smooth" x2="0" y2="100%">
      <stop offset="0" stop-color="#fff" stop-opacity=".1"/>
      <stop offset="1" stop-opacity=".1"/>
    </linearGradient>
    <clipPath id="round">
      <rect width="186" height="28" rx="5" fill="#fff"/>
    </clipPath>
  </defs>
  <g clip-path="url(#round)">
    <!-- Left: dark background -->
    <rect width="118" height="28" fill="#2d2d2d"/>
    <!-- Right: red for failing -->
    <rect x="118" width="68" height="28" fill="#dc2626"/>
    <!-- Gradient overlay -->
    <rect width="186" height="28" fill="url(#smooth)"/>
  </g>
  <!-- Checkbox icon (unchecked / X mark for failing) -->
  <g transform="translate(8, 5)">
    <rect x="0" y="2" width="14" height="14" rx="3" ry="3" fill="none" stroke="#ffffff" stroke-width="1.8"/>
    <path d="M4 5 L10 13 M10 5 L4 13" fill="none" stroke="#f87171" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- "mcp-assert" text -->
  <text x="28" y="18.5" fill="#ffffff" font-family="'DejaVu Sans','Verdana','Geneva',sans-serif" font-size="12" font-weight="bold">
    <tspan fill="#ffffff">mcp</tspan><tspan fill="#93c5fd">-assert</tspan>
  </text>
  <!-- Status text -->
  <text x="152" y="18.5" fill="#ffffff" font-family="'DejaVu Sans','Verdana','Geneva',sans-serif" font-size="12" font-weight="bold" text-anchor="middle">failing</text>
</svg>
