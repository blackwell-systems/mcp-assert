        - id: B
          task: |
            ## What to implement

            ### F2: Shell variable expansion in YAML env: blocks

            When a YAML `env:` block contains values matching `${VAR}` or `$VAR`
            patterns, resolve them from the parent process environment using
            `os.Getenv`.

            1. Add an `expandEnvVars` function in `client.go`:

            ```go
            // expandEnvVars resolves ${VAR} and $VAR patterns in a string
            // from the parent process environment. Unset variables are replaced
            // with empty string, matching shell behavior.
            func expandEnvVars(value string) string {
            	return os.ExpandEnv(value)
            }
            ```

            Note: `os.ExpandEnv` handles both `${VAR}` and `$VAR` syntax natively.

            2. In `createMCPClient`, in the stdio case where env is converted to
            a slice, apply expansion. Find this exact code:

            ```go
            		var envSlice []string
            		for k, v := range server.Env {
            			envSlice = append(envSlice, k+"="+v)
            		}
            ```

            Change to:
            ```go
            		var envSlice []string
            		for k, v := range server.Env {
            			envSlice = append(envSlice, k+"="+expandEnvVars(v))
            		}
            ```

            3. Add the `"os"` import to client.go. The current imports are:

            ```go
            import (
            	"context"
            	"fmt"
            	"path/filepath"
            	"strings"

            	"github.com/blackwell-systems/mcp-assert/internal/assertion"
            	"github.com/mark3labs/mcp-go/client"
            	clienttransport "github.com/mark3labs/mcp-go/client/transport"
            	"github.com/mark3labs/mcp-go/mcp"
            )
            ```

            Add `"os"` to the stdlib imports block.

            ## Tests to write

            Create a new file `internal/runner/client_test.go` with these tests:

            1. `TestExpandEnvVars_DollarBrace`: set env var TEST_TOKEN=secret123, verify
