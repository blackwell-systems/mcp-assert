title: 'Dogfooding Friction Fixes: Generate Safety, Env Expansion, Auth Detection, Single-File Suite'
feature_slug: dogfooding-friction-fixes
verdict: SUITABLE
suitability_assessment: |
    All four friction points map to distinct files with minimal overlap:

    F4 (generate safety) touches generate.go and generate_test.go.
    F2 (env expansion) touches client.go and a new client_test.go.
    F1 (auth detection) touches generate.go (same file as F4, but additive: F4 adds
    annotation-based skip logic in generateStub, F1 adds error detection in Generate).
    Since F1 and F4 both modify generate.go, they must share an agent or be sequenced.
    F3 (single-file suite) touches loader.go and loader_test.go.
    Docs (cli.md, writing-assertions.md, getting-started.md) are independent from code.

    F1 + F4 are combined into one agent (Agent A) since both modify generate.go.
    F2 is independent (Agent B). F3 is independent (Agent C). Docs are independent (Agent D).
    All four agents can run in a single wave since file ownership is disjoint.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~8 min (4 agents x 5 min avg, parallel in 1 wave)
    - Merge and verification: ~3 min
    Total SAW time: ~19 min

    Sequential baseline: ~25 min (4 agents x ~6 min avg)
    Time savings: ~6 min (24% faster)

    Recommendation: Clear speedup. The build/test cycle (go test ./...) takes ~10s,
    and each agent touches 2-4 files with non-trivial logic and tests. Single-wave
    parallelism provides good value.
