interface_contracts:
    - name: isDestructiveTool
      description: |
        Checks whether an MCP tool has destructive annotations.
        Returns true if DestructiveHint is true or ReadOnlyHint is false (explicitly set).
        Used by generateStub to set skip:true on generated YAML.
      definition: |
        func isDestructiveTool(tool mcp.Tool) bool
      location: internal/runner/generate.go
    - name: stubAssertion.Skip
      description: |
        New field on stubAssertion struct for generated YAML output.
        When true, the assertion is skipped during run/ci execution.
      definition: |
        type stubAssertion struct {
            // ... existing fields ...
            Skip    bool           `yaml:"skip,omitempty"`
        }
      location: internal/runner/generate.go
    - name: Assertion.Skip
      description: |
        New field on the Assertion type. When true, the runner skips
        execution and reports StatusSkip.
      definition: |
        type Assertion struct {
            // ... existing fields ...
            Skip            bool                  `yaml:"skip,omitempty"`
        }
      location: internal/assertion/types.go
    - name: expandEnvVars
      description: |
        Expands shell variable patterns in a string value by looking up
        the variable name in os.Getenv. Returns the original string
        if the variable is not set. Handles both ${VAR} and $VAR syntax.
      definition: |
        func expandEnvVars(value string) string
      location: internal/runner/client.go
    - name: LoadSuite (updated)
      description: |
        Updated to accept either a directory path or a single YAML file path.
        When given a file, loads only that one assertion. When given a directory,
        behaves as before.
      definition: |
        func LoadSuite(path string) (*Suite, error)
      location: internal/assertion/loader.go
waves:
    - number: 1
      agents:
        - id: A
          task: |
            ## What to implement

            Two friction fixes in the generate command:

            ### F4: Skip destructive tools by default

            1. Add a `Skip` field to `stubAssertion` in generate.go. Insert after the Timeout field:

            ```go
            Skip    bool           `yaml:"skip,omitempty"`
            ```

            The existing struct context:
            ```go
            type stubAssertion struct {
            	Name    string         `yaml:"name"`
            	Server  stubServer     `yaml:"server"`
            	Setup   []stubToolCall `yaml:"setup,omitempty"`
            	Assert  stubAssert     `yaml:"assert"`
            	Timeout string         `yaml:"timeout"`
            }
            ```

            2. Add a `Skip` field to `Assertion` in `internal/assertion/types.go`.
            Insert after the Timeout field, before Trace:

            ```go
            Skip            bool                  `yaml:"skip,omitempty"`
            ```

            The existing context:
            ```go
            	Timeout         string                `yaml:"timeout"`
            	Trace           []TraceEntry          `yaml:"trace,omitempty"`      // inline tool call sequence
            ```

            3. Add an `isDestructiveTool` function in generate.go:

            ```go
            // isDestructiveTool returns true if the tool's MCP annotations indicate
            // it performs write or destructive operations.
            func isDestructiveTool(tool mcp.Tool) bool {
            	a := tool.Annotations
            	if a.DestructiveHint != nil && *a.DestructiveHint {
            		return true
            	}
            	if a.ReadOnlyHint != nil && !*a.ReadOnlyHint {
            		return true
            	}
            	return false
            }
            ```

            4. Add `--include-writes` flag to `Generate`. Insert after the existing
            `overwrite` flag:

            ```go
            overwrite := fs.Bool("overwrite", false, "Overwrite existing YAML files")
            ```

            Add:
            ```go
            includeWrites := fs.Bool("include-writes", false, "Include write/destructive tools (skipped by default)")
            ```

            5. Update `generateStub` to accept a `skip bool` parameter:

            Change signature from:
            ```go
            func generateStub(tool mcp.Tool, serverSpec string, fixture string) stubAssertion {
            ```
            To:
            ```go
            func generateStub(tool mcp.Tool, serverSpec string, fixture string, skip bool) stubAssertion {
            ```

            And set `stub.Skip = skip` before the return statement.

            6. In the `Generate` function's tool loop, determine skip status and pass
            it to generateStub. Find:
            ```go
            stub := generateStub(tool, *serverSpec, *fixture)
            ```

            Change to:
            ```go
            skip := !*includeWrites && isDestructiveTool(tool)
            stub := generateStub(tool, *serverSpec, *fixture, skip)
            ```

            7. Add a summary of skipped tools at the end of Generate. After the
            existing summary line:
            ```go
            fmt.Printf("\n%d tools discovered, %d assertions created, %d skipped (already exist)\n", len(toolsResult.Tools), created, skipped)
            ```

            Count destructive tools that were auto-skipped and print:
            ```go
            if !*includeWrites {
            	destructive := 0
            	for _, tool := range toolsResult.Tools {
            		if isDestructiveTool(tool) {
            			destructive++
            		}
            	}
            	if destructive > 0 {
            		fmt.Printf("  %d tool(s) marked skip:true (destructive). Use --include-writes to include them.\n", destructive)
            	}
            }
            ```

            ### F1: Auth detection in generate

            When `mcpClient.Initialize` or `mcpClient.ListTools` fails with an error
            containing "transport closed", "EOF", or "connection refused", add a
            helpful hint to the error message.

            Find the Initialize error handling:
            ```go
            if _, err := mcpClient.Initialize(ctx, initReq); err != nil {
            	return fmt.Errorf("MCP initialize failed: %w", err)
            }
            ```

            Change to:
            ```go
            if _, err := mcpClient.Initialize(ctx, initReq); err != nil {
            	if isTransportError(err) {
            		return fmt.Errorf("MCP initialize failed: %w\n\nhint: the server exited immediately. Check that any required environment variables (API keys, tokens) are set", err)
            	}
            	return fmt.Errorf("MCP initialize failed: %w", err)
            }
            ```

            Find the ListTools error handling:
            ```go
            toolsResult, err := mcpClient.ListTools(ctx, mcp.ListToolsRequest{})
            if err != nil {
            	return fmt.Errorf("tools/list failed: %w", err)
            }
            ```

            Change to:
            ```go
            toolsResult, err := mcpClient.ListTools(ctx, mcp.ListToolsRequest{})
            if err != nil {
            	if isTransportError(err) {
            		return fmt.Errorf("tools/list failed: %w\n\nhint: the server exited immediately. Check that any required environment variables (API keys, tokens) are set", err)
            	}
            	return fmt.Errorf("tools/list failed: %w", err)
            }
            ```

            Add the helper function:
            ```go
            // isTransportError checks if an error indicates the server exited
            // or failed to start, which often means missing auth credentials.
            func isTransportError(err error) bool {
            	msg := err.Error()
            	return strings.Contains(msg, "transport closed") ||
            		strings.Contains(msg, "EOF") ||
            		strings.Contains(msg, "connection refused")
            }
            ```

            ## Tests to write (in generate_test.go)

            1. `TestIsDestructiveTool_DestructiveTrue`: tool with DestructiveHint=true returns true.
            2. `TestIsDestructiveTool_ReadOnlyFalse`: tool with ReadOnlyHint=false returns true.
