pre_mortem:
    overall_risk: low
    rows:
        - scenario: Agent A adds Skip field to types.go while Agent C modifies loader.go in the same package
          likelihood: low
          impact: low
          mitigation: |
            types.go and loader.go are separate files. Agent A only adds one field to the
            Assertion struct; Agent C only modifies the LoadSuite function. No overlap.
        - scenario: os.ExpandEnv expands unintended variables in env values
          likelihood: low
          impact: medium
          mitigation: |
            os.ExpandEnv is the standard Go approach. Users who write literal dollar signs
            in env values would need to escape them ($$). This matches shell conventions
            and is documented behavior.
        - scenario: The ToolAnnotation struct does not have DestructiveHint in the mcp-go version used
          likelihood: low
          impact: high
