        - id: C
          task: |
            ## What to implement

            ### F3: Accept single file path for --suite flag

            Update `LoadSuite` to accept either a directory path or a single YAML
            file path. When given a file, load only that one assertion.

            1. In `loader.go`, modify `LoadSuite`. The current function signature and
            opening lines:

            ```go
            func LoadSuite(dir string) (*Suite, error) {
            	entries, err := os.ReadDir(dir)
            	if err != nil {
            		return nil, fmt.Errorf("reading suite dir %s: %w", dir, err)
            	}

            	suite := &Suite{Dir: dir}
            ```

            Replace with:

            ```go
            func LoadSuite(path string) (*Suite, error) {
            	info, err := os.Stat(path)
            	if err != nil {
            		return nil, fmt.Errorf("reading suite path %s: %w", path, err)
            	}

            	// Single file mode: load one YAML file directly.
            	if !info.IsDir() {
            		if !isYAML(info.Name()) {
            			return nil, fmt.Errorf("%s is not a YAML file", path)
            		}
            		a, err := loadFile(path)
            		if err != nil {
            			return nil, err
            		}
            		return &Suite{
            			Assertions: []Assertion{*a},
            			Dir:        filepath.Dir(path),
            		}, nil
            	}

            	// Directory mode: existing behavior.
            	entries, err := os.ReadDir(path)
            	if err != nil {
            		return nil, fmt.Errorf("reading suite dir %s: %w", path, err)
            	}

            	suite := &Suite{Dir: path}
            ```

            Then update all remaining references to `dir` inside the function body
            to use `path`. The variable was renamed from `dir` to `path` in the
            function parameter. Specifically:

            The "no assertion files found" error:
            ```go
            return nil, fmt.Errorf("no assertion files found in %s", dir)
            ```
            becomes:
            ```go
            return nil, fmt.Errorf("no assertion files found in %s", path)
            ```

            The subdir join:
            ```go
            subDir := filepath.Join(dir, entry.Name())
            ```
            becomes:
            ```go
            subDir := filepath.Join(path, entry.Name())
            ```

            The file join:
            ```go
            a, err := loadFile(filepath.Join(dir, entry.Name()))
            ```
            becomes:
            ```go
            a, err := loadFile(filepath.Join(path, entry.Name()))
            ```

            ## Tests to write (in loader_test.go)

            1. `TestLoadSuite_SingleFile`: create a temp dir with a valid YAML,
               call LoadSuite with the file path directly. Verify 1 assertion
               loaded and name is correct.

            2. `TestLoadSuite_SingleFile_NonYAML`: call LoadSuite with a .txt file
               path. Verify it returns an error containing "not a YAML file".

            3. `TestLoadSuite_SingleFile_SetsDir`: verify Dir is set to the parent
               directory of the file, not the file itself.

            4. `TestLoadSuite_SingleFile_YmlExtension`: verify .yml extension also
               works for single file mode.

            ## Verification

            ```bash
