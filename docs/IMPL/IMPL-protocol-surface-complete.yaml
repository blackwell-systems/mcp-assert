            ## Agent B: Sampling as First-Class Test Subject + Logging

            ### What to implement

            Create new files for sampling and logging assertion support. Agent A
            owns types.go and execute.go and will add fields to the Assertion struct
            and dispatch calls that reference your types and functions.

            **1. Sampling types and runner**

            Create internal/assertion/sampling_types.go:
            ```go
            package assertion

            // SamplingAssertBlock tests MCP sampling as a first-class test subject.
            // Combines mock sampling config + tool call + assertions into one block.
            // The runner configures client_capabilities.sampling automatically from
            // MockText/MockModel, calls the specified tool (which triggers the
            // server's sampling request), and asserts on the final tool result.
            type SamplingAssertBlock struct {
            	Tool      string         `yaml:"tool"`
            	Args      map[string]any `yaml:"args,omitempty"`
            	MockText  string         `yaml:"mock_text"`
            	MockModel string         `yaml:"mock_model,omitempty"`
            	Expect    Expect         `yaml:"expect"`
            }
            ```

            Create internal/runner/sampling.go with runSamplingAssertion.
            Follow the exact pattern of runPromptAssertion in execute.go (lines
            300-431). The key differences:

            1. Extract sb := a.AssertSampling
            2. Build a modified server config that includes sampling capability:
               ```go
               server := a.Server
               model := sb.MockModel
               if model == "" {
               	model = "mock"
               }
               if server.ClientCapabilities.Sampling == nil {
               	server.ClientCapabilities.Sampling = &assertion.SamplingConfig{
               		Text:       sb.MockText,
               		Model:      model,
               		StopReason: "end_turn",
               	}
               }
               ```
            3. Use createMCPClient(server, fixture, dockerImage) with the modified config
            4. Initialize the client (same pattern as runPromptAssertion lines 328-337)
            5. Run setup steps (same pattern as lines 340-354)
            6. Call the tool: req.Params.Name = sb.Tool, req.Params.Arguments = substituteAll(sb.Args, fixture, captured)
            7. Extract result text with extractText(result) and check with assertion.Check(sb.Expect, resultText, result.IsError)

            The existing functions createMCPClient, substituteAll, and extractText
            are all in the runner package so you can call them directly.

            **2. Logging types, checker, and runner**

            Create internal/assertion/logging_types.go:
            ```go
            package assertion

            // LoggingAssertBlock tests MCP logging (logging/setLevel + notifications/message).
            type LoggingAssertBlock struct {
            	SetLevel string         `yaml:"set_level"`
            	Tool     string         `yaml:"tool,omitempty"`
            	Args     map[string]any `yaml:"args,omitempty"`
            	Expect   LoggingExpect  `yaml:"expect"`
            }

            // LoggingExpect defines assertions on captured log messages.
            type LoggingExpect struct {
            	MinMessages   *int     `yaml:"min_messages,omitempty"`
            	ContainsLevel []string `yaml:"contains_level,omitempty"`
            	ContainsData  []string `yaml:"contains_data,omitempty"`
            }

            // LogMessage represents a captured notifications/message event.
            type LogMessage struct {
            	Level  string
            	Logger string
            	Data   string
            }
            ```

            Create internal/assertion/logging_checker.go:
            ```go
            package assertion

            import (
            	"fmt"
            	"strings"
            )

            // CheckLogging evaluates logging expectations against captured log messages.
            func CheckLogging(expect LoggingExpect, messages []LogMessage) error {
            	if expect.MinMessages != nil && len(messages) < *expect.MinMessages {
            		return fmt.Errorf("expected at least %d log message(s), got %d",
            			*expect.MinMessages, len(messages))
            	}
            	for _, level := range expect.ContainsLevel {
            		found := false
            		for _, msg := range messages {
            			if msg.Level == level {
            				found = true
            				break
            			}
            		}
            		if !found {
            			return fmt.Errorf("expected log message at level %q, not found", level)
            		}
            	}
            	for _, substr := range expect.ContainsData {
            		found := false
            		for _, msg := range messages {
            			if strings.Contains(msg.Data, substr) {
            				found = true
            				break
            			}
            		}
            		if !found {
            			return fmt.Errorf("expected log data containing %q, not found", substr)
            		}
            	}
            	return nil
            }
            ```

            Create internal/runner/logging.go with runLoggingAssertion:
            1. Extract lb := a.AssertLogging
            2. Create MCP client and initialize (same pattern as other run functions)
            3. Call mcpClient.SetLevel with the configured level:
               ```go
               levelReq := mcp.SetLevelRequest{}
               levelReq.Params.Level = mcp.LoggingLevel(lb.SetLevel)
               if err := mcpClient.SetLevel(ctx, levelReq); err != nil {
               	return fail result
               }
               ```
            4. Register notification handler for "notifications/message":
               ```go
               var mu sync.Mutex
               var logMessages []assertion.LogMessage
               mcpClient.OnNotification(func(n mcp.JSONRPCNotification) {
               	if n.Method == "notifications/message" {
               		// Parse params from the notification
               		data, _ := json.Marshal(n.Params.AdditionalFields)
               		var params struct {
               			Level  string `json:"level"`
               			Logger string `json:"logger"`
               			Data   any    `json:"data"`
               		}
               		json.Unmarshal(data, &params)
               		mu.Lock()
               		logMessages = append(logMessages, assertion.LogMessage{
               			Level:  params.Level,
               			Logger: params.Logger,
               			Data:   fmt.Sprintf("%v", params.Data),
               		})
               		mu.Unlock()
               	}
               })
               ```
            5. If lb.Tool is set, call the tool (same pattern as other run functions)
            6. Check assertions: assertion.CheckLogging(lb.Expect, logMessages)

            NOTE: Check the actual mcp.JSONRPCNotification Params structure. The
            notification handler in execute.go (line 63) just checks n.Method.
            For log messages, the params may be in n.Params.AdditionalFields or
            you may need to marshal/unmarshal n.Params. Look at how the mcp-go
            SDK structures JSONRPCNotification.

            ### Example assertions

            Create examples/mcp-go-everything-logging/ directory with 2 YAML files.

            set_level.yaml:
