            ## Agent A: Resource Subscriptions, Completion, and Types Coordinator

            ### What to implement

            You own types.go and execute.go. You are responsible for:
            1. Adding resource subscription fields to ResourceAssertBlock
            2. Adding the CompletionAssertBlock type and its sub-types
            3. Adding Assertion struct fields for ALL new block types (including
               AssertSampling and AssertLogging for Agent B)
            4. Adding dispatch calls in execute.go for all new block types
            5. Adding runCompletionAssertion to execute.go
            6. Updating runResourceAssertion for subscription support

            **1. Resource subscriptions**

            Add three fields to the existing ResourceAssertBlock struct in types.go.
            The current struct definition starts at line 31:

            ```go
            type ResourceAssertBlock struct {
            	List   *ResourceListArgs  `yaml:"list,omitempty"`
            	Read   string             `yaml:"read,omitempty"`
            	Expect Expect             `yaml:"expect"`
            }
            ```

            Add after Expect:
            ```go
            	Subscribe          string `yaml:"subscribe,omitempty"`
            	Unsubscribe        string `yaml:"unsubscribe,omitempty"`
            	ExpectNotification *bool  `yaml:"expect_notification,omitempty"`
            ```

            Update runResourceAssertion in execute.go to handle subscriptions.
            After the initialize call (around line 203), add subscription handling:
            - If rb.Subscribe is set: register OnNotification handler for
              "notifications/resources/updated", call mcpClient.Subscribe()
            - After list/read execution, check notification count if ExpectNotification
            - If rb.Unsubscribe is set: call mcpClient.Unsubscribe()

            Also update the validation check at line 171. Currently it requires list
            or read; update to also allow subscribe-only assertions:
            ```go
            if rb.List == nil && rb.Read == "" && rb.Subscribe == "" {
            ```

            **2. Completion**

            Add to types.go:
            ```go
            type CompletionAssertBlock struct {
            	Ref      CompletionRef  `yaml:"ref"`
            	Argument CompletionArg  `yaml:"argument"`
            	Expect   Expect         `yaml:"expect"`
            }

            type CompletionRef struct {
            	Type string `yaml:"type"` // "ref/prompt" or "ref/resource"
            	Name string `yaml:"name"` // prompt name or resource URI
            }

            type CompletionArg struct {
            	Name  string `yaml:"name"`  // argument name
            	Value string `yaml:"value"` // partial value for completion
            }
            ```

            Add AssertCompletion *CompletionAssertBlock to the Assertion struct with
            yaml tag `assert_completion,omitempty`.

            Add runCompletionAssertion to execute.go:
            1. Initialize MCP client (use createMCPClient, same pattern as runResourceAssertion)
            2. Build mcp.CompleteRequest. The mcp-go SDK types:
               - mcp.CompleteRequest has Params of type mcp.CompleteParams
               - mcp.CompleteParams has Argument (CompleteArgument) and Context (CompleteContext)
               - mcp.CompleteArgument has Name and Value
               - For the ref context, set it based on ref.Type:
                 "ref/prompt": use the prompt reference mechanism
                 "ref/resource": use the resource reference mechanism
               Note: The CompleteParams struct has a custom UnmarshalJSON. Check the
               mcp-go source for how to set the reference context field properly.
            3. Call mcpClient.Complete(ctx, req) which returns (*mcp.CompleteResult, error)
            4. Marshal the CompleteResult to JSON
            5. Run assertion.Check() on the JSON

            **3. Agent B integration fields**

            Add to the Assertion struct in types.go:
            ```go
            	AssertSampling  *SamplingAssertBlock  `yaml:"assert_sampling,omitempty"`
            	AssertLogging   *LoggingAssertBlock   `yaml:"assert_logging,omitempty"`
