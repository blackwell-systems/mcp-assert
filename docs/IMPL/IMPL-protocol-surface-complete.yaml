interface_contracts:
    - name: SamplingAssertBlock
      description: |
        New assertion block type for testing sampling as a first-class subject.
        Combines mock sampling config + tool call + assertions into one block.
      definition: |
        type SamplingAssertBlock struct {
            Tool       string         `yaml:"tool"`
            Args       map[string]any `yaml:"args,omitempty"`
            MockText   string         `yaml:"mock_text"`
            MockModel  string         `yaml:"mock_model,omitempty"`
            Expect     Expect         `yaml:"expect"`
        }
      location: internal/assertion/sampling_types.go
    - name: LoggingAssertBlock
      description: |
        New assertion block type for testing MCP logging.
        Calls logging/setLevel, then captures notifications/message during execution.
      definition: |
        type LoggingAssertBlock struct {
            SetLevel string         `yaml:"set_level"`
            Tool     string         `yaml:"tool,omitempty"`
            Args     map[string]any `yaml:"args,omitempty"`
            Expect   LoggingExpect  `yaml:"expect"`
        }
        type LoggingExpect struct {
            MinMessages   *int     `yaml:"min_messages,omitempty"`
            ContainsLevel []string `yaml:"contains_level,omitempty"`
            ContainsData  []string `yaml:"contains_data,omitempty"`
        }
        type LogMessage struct {
            Level  string
            Logger string
            Data   string
        }
      location: internal/assertion/logging_types.go
    - name: CompletionAssertBlock
      description: |
        New assertion block type for testing MCP completion/complete.
      definition: |
        type CompletionAssertBlock struct {
            Ref      CompletionRef  `yaml:"ref"`
            Argument CompletionArg  `yaml:"argument"`
            Expect   Expect         `yaml:"expect"`
        }
        type CompletionRef struct {
            Type string `yaml:"type"`
            Name string `yaml:"name"`
        }
        type CompletionArg struct {
            Name  string `yaml:"name"`
            Value string `yaml:"value"`
        }
      location: internal/assertion/types.go
    - name: ResourceSubscriptionFields
      description: |
        New fields on ResourceAssertBlock for subscription testing.
      definition: |
        // Added to existing ResourceAssertBlock:
        Subscribe          string `yaml:"subscribe,omitempty"`
        Unsubscribe        string `yaml:"unsubscribe,omitempty"`
        ExpectNotification *bool  `yaml:"expect_notification,omitempty"`
      location: internal/assertion/types.go
    - name: runSamplingAssertion
