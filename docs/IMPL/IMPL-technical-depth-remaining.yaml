pre_mortem:
    overall_risk: low
    rows:
        - scenario: |
            Agent A's ScanNearbyPositions calls runAssertion which starts a real MCP server.
            Tests may try to start a server and fail. Agent should mock or test only the
            position error detection and YAML patch formatting, not the full scan.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent A's tests should focus on IsPositionError (string matching),
            FixSuggestion formatting, and PrintFixSuggestions output. The
            ScanNearbyPositions integration is tested via the existing e2e suite.
        - scenario: |
            Agent C's intercept proxy may have JSON-RPC framing issues. MCP stdio
            transport uses newline-delimited JSON, but some implementations may send
            multi-line JSON or use Content-Length headers.
          likelihood: low
          impact: medium
          mitigation: |
            Agent C should use bufio.Scanner with a large buffer and handle both
            newline-delimited and potential Content-Length framing. Tests should
            cover both formats.
        - scenario: |
            Agent B's watch refactor breaks the existing watch behavior by not
            properly replicating the Run() logic in runAndCollect.
          likelihood: medium
          impact: medium
          mitigation: |
            Agent B should keep runAndCollect as close to Run() as possible,
            extracting only the assertion execution loop. The existing watch
            behavior (clear screen, rerun on change) must be preserved.
        - scenario: |
            Agent D writes docs that don't match the actual implementation
            because it runs in wave 2 but doesn't see the wave 1 code.
          likelihood: low
          impact: low
          mitigation: |
            Agent D's task prompt includes detailed specifications of all three
            features. The docs should be written from the spec, not from reading
            the implementation code.
