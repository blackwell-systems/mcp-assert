title: 'Technical Depth Remaining: --fix mode, watch diff view, live intercept'
feature_slug: technical-depth-remaining
verdict: SUITABLE
suitability_assessment: |
    All five suitability questions resolve cleanly:

    1. File decomposition: The three features (--fix mode, watch diff view, live intercept)
       touch largely disjoint files. --fix mode modifies commands.go (flag parsing) and adds
       new fix logic. Watch diff view modifies watch.go and adds diff formatting in report/.
       Live intercept is an entirely new command with new files. Disjoint ownership is achievable
       with 3 agents in wave 1 plus a docs/integration agent in wave 2.

    2. Investigation-first: No unknowns. All three features have clear specifications.
       The MCP stdio proxy pattern for intercept is well-understood (pipe stdin/stdout,
       tee the JSON-RPC messages).

    3. Interface discoverability: Cross-agent interfaces are minimal. The main shared
       type is assertion.Result (already exists). The new FixSuggestion type is only
       used by Agent A. The diff formatting in report/ is only used by Agent B.
       The intercept command is self-contained.

    4. Pre-implementation status: All three items are TODO (listed in roadmap.md,
       no existing code).

    5. Parallelization value: Build+test cycle is ~10s (Go). Three agents with
       3-6 files each. All agents are independent (wave 1), so maximum parallelization.
       Clear speedup over sequential.

    Estimated times:
    - Scout phase: ~8 min
    - Agent execution: ~8 min (3 agents in parallel, ~8 min each, plus wave 2 ~5 min)
    - Merge and verification: ~3 min
    Total SAW time: ~19 min

    Sequential baseline: ~30 min (3 features x 10 min avg)
    Time savings: ~11 min (37% faster)

    Recommendation: Clear speedup. Proceed.
