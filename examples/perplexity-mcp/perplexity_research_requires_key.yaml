name: perplexity_research returns 401 with invalid API key
server:
  command: npx
  args: [-y, "@perplexity-ai/mcp-server"]
  env:
    PERPLEXITY_API_KEY: dummy
assert:
  tool: perplexity_research
  args:
    messages:
      - role: user
        content: "test"
  expect:
    is_error: true
    contains: ["401", "Invalid API key"]
timeout: 15s
