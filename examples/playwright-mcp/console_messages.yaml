name: browser_console_messages returns without error
server:
  command: /Users/dayna.blackwell/.brewprune/bin/npx
  args: [-y, "@playwright/mcp", --headless]
setup:
  - tool: browser_navigate
    args:
      url: "https://example.com"
assert:
  tool: browser_console_messages
  args: {}
  expect:
    not_error: true
timeout: 30s
