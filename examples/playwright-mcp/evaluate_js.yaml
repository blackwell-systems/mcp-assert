name: browser_evaluate runs JavaScript
server:
  command: npx
  args: [-y, "@playwright/mcp", --headless]
setup:
  - tool: browser_navigate
    args:
      url: "https://example.com"
assert:
  tool: browser_evaluate
  args:
    function: "document.title"
  expect:
    not_error: true
    not_empty: true
    contains: ["Example Domain"]
timeout: 30s
