# Same assertion as stdio version, but over HTTP transport.
# Requires the everything server running: /tmp/mcp-go-everything-server --transport http
name: echo over HTTP transport
server:
  transport: http
  url: "http://localhost:8080/mcp"
assert:
  args:
    message: hello from mcp-assert
  expect:
    contains:
    - 'Echo: hello from mcp-assert'
    not_empty: true
    not_error: true
  tool: echo
timeout: 15s
