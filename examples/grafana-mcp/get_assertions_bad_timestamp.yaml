# Fixed in grafana/mcp-grafana#793 (merged 2026-04-27).
# Still crashes in current published binary; waiting for new release.
name: get_assertions returns isError on bad timestamp
skip: true
server:
  command: mcp-grafana
  args: [-t, stdio]
assert:
  tool: get_assertions
  args:
    startTime: "not-a-date"
    endTime: "also-not-a-date"
  expect:
    is_error: true
timeout: 15s
