# Fixed in grafana/mcp-grafana#793 (merged 2026-04-27).
# Previously returned internal error (-32603); now returns isError:true.
name: get_assertions returns isError on bad timestamp
server:
  command: mcp-grafana
  args: [-t, stdio]
assert:
  tool: get_assertions
  args:
    startTime: "not-a-date"
    endTime: "also-not-a-date"
  expect:
    is_error: true
timeout: 15s
