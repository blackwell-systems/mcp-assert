name: search_folders works with live Grafana
skip_unless_env: GRAFANA_SERVICE_ACCOUNT_TOKEN
server:
  command: mcp-grafana
  args: [-t, stdio]
  env:
    GRAFANA_URL: "${GRAFANA_URL}"
    GRAFANA_SERVICE_ACCOUNT_TOKEN: "${GRAFANA_SERVICE_ACCOUNT_TOKEN}"
assert:
  tool: search_folders
  args: {}
  expect:
    not_error: true
timeout: 15s
