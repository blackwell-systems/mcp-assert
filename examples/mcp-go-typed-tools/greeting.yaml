# Greeting tool: generates a personalized greeting with typed arguments
name: greeting returns personalized greeting
server:
  command: mcp-go-typed-tools
  args: []
assert:
  tool: greeting
  args:
    name: "Alice"
    age: 30
    is_vip: true
    languages: ["English", "Spanish"]
    metadata:
      location: "New York"
      timezone: "EST"
  expect:
    not_error: true
    not_empty: true
    contains: ["Hello, Alice!", "30 years old", "VIP", "New York", "EST", "2 languages"]
timeout: 15s
