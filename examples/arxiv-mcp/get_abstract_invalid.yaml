# BUG: get_abstract returns isError=false with error content for invalid paper ID.
# Fix submitted: blazickjp/arxiv-mcp-server#93
# Until merged, this assertion documents the current (buggy) behavior.
name: get_abstract returns error content but isError=false for invalid paper (BUG)
skip: true
server:
  command: /Users/dayna.blackwell/.local/bin/uvx
  args: [arxiv-mcp-server]
assert:
  tool: get_abstract
  args:
    paper_id: "0000.00000"
  expect:
    is_error: true
    contains: ["not found"]
timeout: 30s
