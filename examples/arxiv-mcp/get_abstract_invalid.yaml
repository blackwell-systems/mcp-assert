# BUG: get_abstract returns isError=false with error content for invalid paper ID.
# The response body contains {"status": "error", "message": "Paper ... not found"}
# but isError is not set, so MCP clients treat this as a successful call.
# Agents checking isError will miss the error.
name: get_abstract returns error content but isError=false for invalid paper (BUG)
server:
  command: /Users/dayna.blackwell/.local/bin/uvx
  args: [arxiv-mcp-server]
assert:
  tool: get_abstract
  args:
    paper_id: "0000.00000"
  expect:
    not_error: true
    contains: ["not found"]
timeout: 30s
