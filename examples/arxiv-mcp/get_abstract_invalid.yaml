# BUG: get_abstract returns isError=false with error content for invalid paper ID.
# Issue filed: blazickjp/arxiv-mcp-server#92 (closed).
# Fix claimed in #95 (v0.5.0) but isError still not set as of 2026-04-26.
name: get_abstract returns error content but isError=false for invalid paper (BUG)
skip: true
server:
  command: /Users/dayna.blackwell/.local/bin/uvx
  args: [arxiv-mcp-server]
assert:
  tool: get_abstract
  args:
    paper_id: "0000.00000"
  expect:
    is_error: true
    contains: ["not found"]
timeout: 30s
