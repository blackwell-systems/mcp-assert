# get_abstract with invalid paper ID should return isError=true.
# Previously returned isError=false with error content in body (blazickjp/arxiv-mcp-server#92).
name: get_abstract rejects invalid paper ID
server:
  command: /Users/dayna.blackwell/.local/bin/uvx
  args: [arxiv-mcp-server]
assert:
  tool: get_abstract
  args:
    paper_id: "0000.00000"
  expect:
    is_error: true
    contains: ["not found"]
timeout: 30s
