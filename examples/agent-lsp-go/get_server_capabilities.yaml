name: get_server_capabilities returns gopls feature map
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
assert:
  tool: get_server_capabilities
  expect:
    not_error: true
    not_empty: true
    contains: ["hoverProvider", "referencesProvider"]
timeout: 30s
