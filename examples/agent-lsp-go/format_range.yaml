name: format_range formats Person struct range
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
assert:
  tool: format_range
  args:
    file_path: "{{fixture}}/main.go"
    start_line: 6
    start_column: 1
    end_line: 9
    end_column: 2
  expect:
    not_error: true
timeout: 30s
