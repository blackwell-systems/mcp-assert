name: prepare_rename validates Person is renameable
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/main.go"
assert:
  tool: prepare_rename
  args:
    file_path: "{{fixture}}/main.go"
    line: 7
    column: 6
  expect:
    not_error: true
    contains: ["Person"]
timeout: 30s
