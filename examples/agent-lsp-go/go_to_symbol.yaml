name: go_to_symbol navigates to Person by name
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
  - tool: open_document
    args:
      file_path: "{{fixture}}/greeter.go"
      language_id: go
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/main.go"
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/greeter.go"
assert:
  tool: go_to_symbol
  args:
    symbol_path: Greeter
  expect:
    not_error: true
    contains: ["greeter.go"]
timeout: 30s
