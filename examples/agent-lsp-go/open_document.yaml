name: open_document opens main.go for analysis
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
assert:
  tool: open_document
  args:
    file_path: "{{fixture}}/main.go"
    language_id: go
  expect:
    not_error: true
timeout: 30s
