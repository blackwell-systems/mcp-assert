name: speculative edit detects type error with net_delta > 0
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/greeter.go"
      language_id: go
assert:
  tool: simulate_edit_atomic
  args:
    file_path: "{{fixture}}/greeter.go"
    start_line: 15
    start_column: 2
    end_line: 15
    end_column: 40
    new_text: "return 42"
  expect:
    not_error: true
    contains: ["net_delta"]
timeout: 60s
