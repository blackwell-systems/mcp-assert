name: get_symbol_documentation looks up Person docs
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
assert:
  tool: get_symbol_documentation
  args:
    symbol: Person
    language_id: go
    file_path: "{{fixture}}/main.go"
  expect:
    not_error: true
timeout: 30s
