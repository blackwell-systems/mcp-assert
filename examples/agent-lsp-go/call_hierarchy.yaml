name: call_hierarchy shows callers of Greet method
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
  - tool: open_document
    args:
      file_path: "{{fixture}}/greeter.go"
      language_id: go
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/main.go"
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/greeter.go"
assert:
  tool: call_hierarchy
  args:
    file_path: "{{fixture}}/main.go"
    line: 12
    column: 18
  expect:
    not_error: true
    not_empty: true
timeout: 120s
