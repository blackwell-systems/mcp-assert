name: go_to_declaration resolves p variable declaration
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
assert:
  tool: go_to_declaration
  args:
    file_path: "{{fixture}}/main.go"
    line: 21
    column: 7
  expect:
    not_error: true
timeout: 30s
