name: session lifecycle creates and validates a simulation session
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/main.go"
assert:
  tool: create_simulation_session
  args:
    workspace_root: "{{fixture}}"
    language: go
  expect:
    not_error: true
    not_empty: true
    contains: ["session"]
timeout: 120s
