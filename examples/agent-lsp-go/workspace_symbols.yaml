name: get_workspace_symbols finds Person type
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
assert:
  tool: get_workspace_symbols
  args:
    query: "Greet"
  expect:
    not_error: true
    not_empty: true
    contains: ["Greet"]
timeout: 30s
