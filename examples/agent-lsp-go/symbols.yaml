name: get_document_symbols lists Person type and methods
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
assert:
  tool: get_document_symbols
  args:
    file_path: "{{fixture}}/main.go"
  expect:
    not_error: true
    not_empty: true
    contains: ["Person", "Greet"]
timeout: 30s
