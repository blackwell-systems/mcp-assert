# Verify get_code_actions returns without error at a valid position.
# Tests the tool interface without modifying the fixture file.
name: code actions for error — unused variable diagnostic
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/main.go"
assert:
  tool: get_code_actions
  args:
    file_path: "{{fixture}}/main.go"
    start_line: 6
    start_column: 1
    end_line: 6
    end_column: 1
  expect:
    not_error: true
timeout: 120s
