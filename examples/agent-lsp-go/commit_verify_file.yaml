# Commit a simulated edit then verify the change is visible via get_symbol_source.
# Captures session_id, adds a comment, commits to disk, then checks the result.
# NOTE: This modifies the fixture file — run after other tests or use a copy.
name: commit session — verify file modified via get_symbol_source
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/main.go"
  - tool: create_simulation_session
    args:
      workspace_root: "{{fixture}}"
      language: go
    capture:
      session_id: "$.session_id"
  - tool: simulate_edit
    args:
      session_id: "{{session_id}}"
      file_path: "{{fixture}}/main.go"
      start_line: 5
      start_column: 1
      end_line: 5
      end_column: 1
      new_text: "// committed\n"
  - tool: commit_session
    args:
      session_id: "{{session_id}}"
      apply: true
assert:
  tool: get_symbol_source
  args:
    file_path: "{{fixture}}/main.go"
    line: 6
    column: 6
  expect:
    not_error: true
    contains: ["committed"]
timeout: 120s
