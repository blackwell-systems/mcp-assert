name: restart_lsp_server restarts cleanly after use
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/main.go"
assert:
  tool: restart_lsp_server
  args:
    root_dir: "{{fixture}}"
  expect:
    not_error: true
timeout: 120s
