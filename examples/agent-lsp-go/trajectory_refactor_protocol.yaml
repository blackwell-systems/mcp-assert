# The refactor skill requires blast radius analysis BEFORE any edits.
# find_references (or blast_radius) must come before preview_edit.
# The protocol must NOT proceed directly to apply_edit without simulation.
name: lsp-refactor performs blast radius analysis before editing
trace:
  - tool: find_references
    args:
      file_path: "fixtures/go/main.go"
      line: 6
      column: 6
  - tool: preview_edit
    args:
      file_path: "fixtures/go/main.go"
      workspace_root: "fixtures/go"
      language: go
      start_line: 6
      start_column: 1
      end_line: 9
      end_column: 2
      new_text: "type Entity struct {\n\tName string\n\tAge  int\n}\n"
  - tool: apply_edit
    args:
      file_path: "fixtures/go/main.go"
  - tool: get_diagnostics
    args:
      file_path: "fixtures/go/main.go"
trajectory:
  - type: order
    tools: ["find_references", "preview_edit", "apply_edit"]
  - type: presence
    tools: ["find_references", "preview_edit", "get_diagnostics"]
  - type: absence
    tools: ["rename_symbol"]
