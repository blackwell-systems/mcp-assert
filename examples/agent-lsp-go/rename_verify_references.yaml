# Rename workflow: open both files, get references on add, then dry-run rename.
# Captures reference data to verify the function has callers before renaming.
name: rename verify — get references then dry-run rename add to sum
server:
  command: agent-lsp
  args: ["go:gopls"]
setup:
  - tool: start_lsp
    args:
      root_dir: "{{fixture}}"
  - tool: open_document
    args:
      file_path: "{{fixture}}/main.go"
      language_id: go
  - tool: open_document
    args:
      file_path: "{{fixture}}/greeter.go"
      language_id: go
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/main.go"
  - tool: get_diagnostics
    args:
      file_path: "{{fixture}}/greeter.go"
  - tool: get_references
    args:
      file_path: "{{fixture}}/main.go"
      line: 17
      column: 6
assert:
  tool: rename_symbol
  args:
    file_path: "{{fixture}}/main.go"
    line: 17
    column: 6
    new_name: "sum"
    dry_run: true
  expect:
    not_error: true
    contains: ["main.go"]
timeout: 120s
