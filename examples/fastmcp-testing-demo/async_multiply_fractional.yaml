# Async multiply tool: handles fractional results
name: async_multiply with fractional result
server:
  command: uvx
  args: [fastmcp, run, /tmp/fastmcp/examples/testing_demo/server.py]
assert:
  tool: async_multiply
  args:
    x: 1.5
    "y": 2.0
  expect:
    not_error: true
    not_empty: true
    contains: ["3"]
timeout: 30s
