# Add tool: identity — adding zero returns the other operand
name: add with zero returns the other number
server:
  command: uvx
  args: [fastmcp, run, /tmp/fastmcp/examples/testing_demo/server.py]
assert:
  tool: add
  args:
    a: 42
    b: 0
  expect:
    not_error: true
    not_empty: true
    contains: ["42"]
timeout: 30s
