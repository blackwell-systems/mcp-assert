# Test prompts/get with arguments — retrieve the hello prompt with a name argument.
name: prompts/get returns hello prompt for Alice
server:
  command: uvx
  args: [fastmcp, run, /tmp/fastmcp/examples/testing_demo/server.py]
assert_prompts:
  get:
    name: "hello"
    arguments:
      name: "Alice"
  expect:
    not_error: true
    not_empty: true
    contains: ["Alice"]
timeout: 30s
