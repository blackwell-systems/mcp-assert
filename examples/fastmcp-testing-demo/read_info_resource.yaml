# Test resources/read — read the static demo://info resource.
name: resources/read returns server info content
server:
  command: uvx
  args: [fastmcp, run, /tmp/fastmcp/examples/testing_demo/server.py]
assert_resources:
  read: "demo://info"
  expect:
    not_error: true
    not_empty: true
    contains: ["FastMCP Testing Demo"]
timeout: 30s
