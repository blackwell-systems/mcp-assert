# Async multiply tool: handles negative floats correctly
name: async_multiply with negative numbers
server:
  command: uvx
  args: [fastmcp, run, /tmp/fastmcp/examples/testing_demo/server.py]
assert:
  tool: async_multiply
  args:
    x: -3.0
    "y": 4.0
  expect:
    not_error: true
    not_empty: true
    contains: ["-12"]
timeout: 30s
