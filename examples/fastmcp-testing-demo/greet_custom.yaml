# Greet tool: uses a custom greeting when provided
name: greet with custom greeting
server:
  command: uvx
  args: [fastmcp, run, /tmp/fastmcp/examples/testing_demo/server.py]
assert:
  tool: greet
  args:
    name: "Bob"
    greeting: "Howdy"
  expect:
    not_error: true
    not_empty: true
    contains: ["Howdy", "Bob"]
timeout: 30s
