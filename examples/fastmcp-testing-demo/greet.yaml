# Greet tool: greets someone with default greeting
name: greet with default greeting
server:
  command: uvx
  args: [fastmcp, run, /tmp/fastmcp/examples/testing_demo/server.py]
assert:
  tool: greet
  args:
    name: "Alice"
  expect:
    not_error: true
    not_empty: true
    contains: ["Hello", "Alice"]
timeout: 30s
