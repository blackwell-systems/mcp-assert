name: get_repository_tree with path filter returns subtree
server:
  command: github-mcp-server
  args: [stdio]
assert:
  tool: get_repository_tree
  args:
    owner: blackwell-systems
    repo: mcp-assert
    recursive: true
    path_filter: "internal/assertion"
  expect:
    not_error: true
    not_empty: true
    contains: ["checker.go", "types.go"]
timeout: 30s
