name: list_branches returns branches for mcp-assert
server:
  command: /Users/dayna.blackwell/code/github-mcp-server/github-mcp-server
  args: [stdio]
assert:
  tool: list_branches
  args:
    owner: blackwell-systems
    repo: mcp-assert
  expect:
    not_error: true
    not_empty: true
    contains: ["main"]
timeout: 30s
