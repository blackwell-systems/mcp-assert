# Negative test: search for something that doesn't exist.
# Uses not_contains to verify the nonexistent entity is NOT in results.
# No setup steps — the server starts with an empty knowledge graph.
name: search returns empty for nonexistent entity
server:
  command: npx
  args: ["@modelcontextprotocol/server-memory"]
assert:
  tool: search_nodes
  args:
    query: "NonexistentEntity12345"
  expect:
    not_error: true
    not_contains: ["NonexistentEntity12345"]
timeout: 15s
