name: get_recommended_tools suggests tools for 10-K analysis
skip_unless_env: SEC_EDGAR_USER_AGENT
server:
  command: uvx
  args: [sec-edgar-mcp]
  env:
    SEC_EDGAR_USER_AGENT: "${SEC_EDGAR_USER_AGENT}"
assert:
  tool: get_recommended_tools
  args:
    form_type: "10-K"
  expect:
    not_error: true
    not_empty: true
timeout: 20s
