name: search_companies finds results for known query
skip_unless_env: SEC_EDGAR_USER_AGENT
server:
  command: uvx
  args: [sec-edgar-mcp]
  env:
    SEC_EDGAR_USER_AGENT: "${SEC_EDGAR_USER_AGENT}"
assert:
  tool: search_companies
  args:
    query: "Tesla"
  expect:
    not_error: true
    not_empty: true
timeout: 20s
