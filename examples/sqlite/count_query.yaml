# Aggregate query: verify COUNT returns the expected number.
name: read_query counts rows correctly
server:
  command: uvx
  args: ["mcp-server-sqlite", "--db-path", "{{fixture}}/test.db"]
assert:
  tool: read_query
  args:
    query: "SELECT COUNT(*) as total FROM users"
  expect:
    not_error: true
    contains: ["3"]                        # Fixture DB has 3 users
timeout: 15s
