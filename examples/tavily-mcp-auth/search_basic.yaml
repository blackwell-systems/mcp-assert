name: tavily_search returns results for a known query
server:
  command: npx
  args:
    - -y
    - tavily-mcp@latest
  env:
    TAVILY_API_KEY: ${TAVILY_API_KEY}
assert:
  tool: tavily_search
  args:
    query: "what is the MCP protocol"
  expect:
    not_error: true
    not_empty: true
    contains:
      - "Model Context Protocol"
skip_unless_env: TAVILY_API_KEY
timeout: 30s
