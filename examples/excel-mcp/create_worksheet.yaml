name: create_worksheet adds a new sheet
server:
  command: excel-mcp-server
  args: [stdio]
  env:
    EXCEL_FILES_PATH: "{{fixture}}"
setup:
  - tool: create_workbook
    args:
      filepath: "{{fixture}}/sheets.xlsx"
assert:
  tool: create_worksheet
  args:
    filepath: "{{fixture}}/sheets.xlsx"
    sheet_name: Sales
  expect:
    not_error: true
timeout: 30s
