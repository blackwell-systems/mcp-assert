# Stateful test with setup: create a file first, then move it.
# Setup steps run in order before the assertion. If any setup step fails,
# the entire assertion fails.
name: move_file renames a file
server:
  command: npx
  args: ["@modelcontextprotocol/server-filesystem", "{{fixture}}"]
setup:
  - tool: write_file                       # Create the file to move
    args:
      path: "{{fixture}}/moveme.txt"
      content: "to be moved"
assert:
  tool: move_file
  args:
    source: "{{fixture}}/moveme.txt"
    destination: "{{fixture}}/moved.txt"
  expect:
    not_error: true
timeout: 15s
