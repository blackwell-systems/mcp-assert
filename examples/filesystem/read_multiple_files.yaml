# Read multiple files in a single tool call. Note the array argument —
# {{fixture}} substitution works inside arrays and nested objects too.
name: read_multiple_files reads two files at once
server:
  command: npx
  args: ["@modelcontextprotocol/server-filesystem", "{{fixture}}"]
assert:
  tool: read_multiple_files
  args:
    paths:
      - "{{fixture}}/hello.txt"
      - "{{fixture}}/config.json"
  expect:
    not_error: true
    contains: ["Hello, world!", "test-project"]  # Content from both files
timeout: 15s
