# List directory contents and verify expected files are present.
name: list_directory shows fixture contents
server:
  command: npx
  args: ["@modelcontextprotocol/server-filesystem", "{{fixture}}"]
assert:
  tool: list_directory
  args:
    path: "{{fixture}}"
  expect:
    not_error: true
    not_empty: true
    contains: ["hello.txt", "config.json", "subdir"]  # All expected entries
timeout: 15s
