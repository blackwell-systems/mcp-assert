# Test file editing with dryRun: true so the fixture file is not modified.
# This pattern lets you test edit functionality without side effects.
name: edit_file modifies existing file content
server:
  command: npx
  args: ["@modelcontextprotocol/server-filesystem", "{{fixture}}"]
assert:
  tool: edit_file
  args:
    path: "{{fixture}}/hello.txt"
    edits:
      - oldText: "Hello, world!"
        newText: "Hello, mcp-assert!"
    dryRun: true                           # Preview only — don't modify the file
  expect:
    not_error: true
timeout: 15s
