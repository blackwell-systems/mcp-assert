# Negative test: verify the server rejects requests outside its allowed directory.
# Use is_error to assert the tool SHOULD return an error. This is how you test
# that your server's security boundaries work correctly.
name: read_file rejects path outside allowed directory
server:
  command: npx
  args: ["@modelcontextprotocol/server-filesystem", "{{fixture}}"]
assert:
  tool: read_file
  args:
    path: "/etc/passwd"                    # Path outside the allowed directory
  expect:
    is_error: true                         # Assert the tool DID return an error
timeout: 15s
