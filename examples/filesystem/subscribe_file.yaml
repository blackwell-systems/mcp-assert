# Subscribe to a file resource for change notifications.
# Verifies that resources/subscribe succeeds without error.
name: subscribe to file resource succeeds
server:
  command: npx
  args: ["@modelcontextprotocol/server-filesystem", "{{fixture}}"]
assert_resources:
  subscribe: "file://{{fixture}}/hello.txt"
  list: {}
  expect:
    not_error: true
timeout: 15s
