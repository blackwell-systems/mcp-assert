# Search for files matching a glob pattern.
name: search_files finds matching files
server:
  command: npx
  args: ["@modelcontextprotocol/server-filesystem", "{{fixture}}"]
assert:
  tool: search_files
  args:
    path: "{{fixture}}"
    pattern: "*.txt"
  expect:
    not_error: true
    contains: ["hello.txt"]                # Should find our fixture file
timeout: 15s
