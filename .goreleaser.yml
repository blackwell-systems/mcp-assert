version: 2

builds:
  - id: mcp-assert
    main: ./cmd/mcp-assert
    binary: mcp-assert
    ldflags:
      - -s -w -X main.Version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: mcp-assert
    builds:
      - mcp-assert
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "mcp-assert_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
